<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Calculator - Position Size</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0b0d;
            color: #e8eaed;
            padding: 40px;
            min-height: 100vh;
        }
        .container { max-width: 500px; margin: 0 auto; }
        h1 { margin-bottom: 24px; font-size: 1.5rem; }
        .card {
            background: #111318;
            border: 1px solid #2a2e38;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .input-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 0.85rem;
            color: #9aa0a6;
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            background: #1a1d23;
            border: 1px solid #2a2e38;
            border-radius: 8px;
            color: #e8eaed;
            font-size: 1rem;
        }
        input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        .result {
            background: #1a1d23;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }
        .result-label {
            font-size: 0.85rem;
            color: #9aa0a6;
        }
        .result-value {
            font-size: 1.5rem;
            font-weight: 600;
            color: #3b82f6;
            margin-top: 4px;
        }
        .warning {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 12px 16px;
            border-radius: 8px;
            margin-top: 16px;
            font-size: 0.9rem;
            display: none;
        }
        .warning.show { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧮 Position Size Calculator</h1>
        
        <div class="card">
            <div class="input-group">
                <label>Account Size ($)</label>
                <input type="number" id="account" value="25000" oninput="calculate()">
            </div>
            
            <div class="input-group">
                <label>Risk Per Trade ($) - Max 1%</label>
                <input type="number" id="risk" value="250" oninput="calculate()">
            </div>
            
            <div class="input-group">
                <label>Entry Price ($)</label>
                <input type="number" id="entry" placeholder="150.00" step="0.01" oninput="calculate()">
            </div>
            
            <div class="input-group">
                <label>Stop Loss ($)</label>
                <input type="number" id="stop" placeholder="145.00" step="0.01" oninput="calculate()">
            </div>
            
            <div class="result">
                <div class="result-label">Position Size</div>
                <div class="result-value" id="positionSize">$0</div>
            </div>
            
            <div class="result" style="margin-top: 12px;">
                <div class="result-label">Risk %</div>
                <div class="result-value" id="riskPercent" style="color: #22c55e;">0%</div>
            </div>
            
            <div class="warning" id="warning">
                ⚠️ Risk exceeds 1% of account. Reduce position size.
            </div>
        </div>
    </div>
    
    <script>
        function calculate() {
            const account = parseFloat(document.getElementById('account').value) || 0;
            const risk = parseFloat(document.getElementById('risk').value) || 0;
            const entry = parseFloat(document.getElementById('entry').value) || 0;
            const stop = parseFloat(document.getElementById('stop').value) || 0;
            
            if (entry && stop && entry !== stop) {
                const stopDistance = Math.abs(entry - stop);
                const stopPercent = stopDistance / entry;
                const positionSize = risk / stopPercent;
                const riskPercent = (risk / account) * 100;
                
                document.getElementById('positionSize').textContent = '$' + positionSize.toFixed(2);
                document.getElementById('riskPercent').textContent = riskPercent.toFixed(2) + '%';
                
                if (riskPercent > 1) {
                    document.getElementById('riskPercent').style.color = '#ef4444';
                    document.getElementById('warning').classList.add('show');
                } else {
                    document.getElementById('riskPercent').style.color = '#22c55e';
                    document.getElementById('warning').classList.remove('show');
                }
            }
        }
    </script>
</body>
</html>
