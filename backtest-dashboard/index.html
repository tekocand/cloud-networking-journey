<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Backtest Dashboard</title>
  <style>
    body{font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial;max-width:900px;margin:24px auto}
    input,button{font-size:16px;padding:8px;margin:6px}
    .row{display:flex;align-items:center}
    label{width:160px}
    pre{background:#f7f7f7;padding:12px}
  </style>
</head>
<body>
  <h1>Backtest Dashboard — Quick P&L Calculator</h1>
  <p>Use R-multiple × risk% to calculate trade P&L (account %).</p>

  <div>
    <div class="row"><label>Account size (USD)</label><input id="account" type="number" value="25000"></div>
    <div class="row"><label>Risk per trade (%)</label><input id="riskPct" type="number" step="0.01" value="1"></div>
    <div class="row"><label>R-multiple</label><input id="rMul" type="number" step="0.01" value="3.33"></div>
    <div class="row"><label>Entry price</label><input id="entry" type="number" step="0.0001" value="100"></div>
    <div class="row"><label>Exit price</label><input id="exit" type="number" step="0.0001" value="110"></div>
    <div class="row"><label></label><button id="calc">Calculate</button></div>
  </div>

  <h2>Results</h2>
  <pre id="out">-</pre>

  <script>
    function calculatePnL() {
      // Use R-multiple * risk% as account P&L percent
      const account = parseFloat(document.getElementById('account').value) || 0
      const riskPct = parseFloat(document.getElementById('riskPct').value) || 0
      const rMul = parseFloat(document.getElementById('rMul').value) || 0
      const entry = parseFloat(document.getElementById('entry').value) || 0
      const exit = parseFloat(document.getElementById('exit').value) || 0

      const pnlPctByR = rMul * riskPct
      const pnlUsdByR = account * (pnlPctByR/100)

      // Also show price-change based P&L for comparison
      let priceChangePct = 0
      if(entry !== 0) priceChangePct = ((exit - entry)/entry) * 100
      const priceChangeUsd = account * (priceChangePct/100)

      return {
        pnlPctByR: pnlPctByR,
        pnlUsdByR: pnlUsdByR,
        priceChangePct: priceChangePct,
        priceChangeUsd: priceChangeUsd
      }
    }

    document.getElementById('calc').addEventListener('click', ()=>{
      const res = calculatePnL()
      document.getElementById('out').textContent = `By R-multiple calculation:\n- P&L = ${res.pnlPctByR.toFixed(4)}% → $${res.pnlUsdByR.toFixed(2)}\n\nBy price-change calculation:\n- P&L = ${res.priceChangePct.toFixed(4)}% → $${res.priceChangeUsd.toFixed(2)}\n\nNote: Use the R-multiple method for account % P&L when you size by risk.`
    })
  </script>
</body>
</html>
